<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>릴스 콘티 생성기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Pretendard', -apple-system, 'Malgun Gothic', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header { text-align: center; margin-bottom: 40px; }
    header h1 { font-size: 28px; color: #fff; margin-bottom: 8px; }
    header p { color: #888; font-size: 14px; }

    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .tab {
      flex: 1; padding: 14px; text-align: center; cursor: pointer;
      background: #141414; color: #888; font-size: 14px; font-weight: 600;
      transition: all 0.2s; border: none;
    }
    .tab.active { background: #1a1a2e; color: #7c6ef0; }
    .tab:hover:not(.active) { background: #1a1a1a; color: #aaa; }

    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: #141414; border: 1px solid #2a2a2a; border-radius: 12px;
      padding: 24px; margin-bottom: 20px; max-width: 600px; margin-left: auto; margin-right: auto;
    }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 13px; color: #aaa; margin-bottom: 8px; font-weight: 500; }

    textarea {
      width: 100%; min-height: 120px; background: #0a0a0a; border: 1px solid #2a2a2a;
      border-radius: 8px; color: #e0e0e0; padding: 14px; font-size: 14px;
      font-family: inherit; resize: vertical; transition: border-color 0.2s;
    }
    textarea:focus { outline: none; border-color: #7c6ef0; }
    textarea::placeholder { color: #555; }

    input[type="text"] {
      width: 100%; background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 8px;
      color: #e0e0e0; padding: 12px 14px; font-size: 14px; font-family: inherit;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { outline: none; border-color: #7c6ef0; }
    input[type="text"]::placeholder { color: #555; }

    .type-selector { display: flex; gap: 8px; flex-wrap: wrap; }
    .type-btn {
      padding: 8px 16px; border-radius: 20px; border: 1px solid #2a2a2a;
      background: #0a0a0a; color: #888; cursor: pointer; font-size: 13px; transition: all 0.2s;
    }
    .type-btn.active { background: #1a1a2e; border-color: #7c6ef0; color: #7c6ef0; }
    .type-btn:hover:not(.active) { border-color: #555; color: #ccc; }

    .submit-btn {
      width: 100%; padding: 16px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #7c6ef0, #5a4fd4); color: #fff;
      font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit;
    }
    .submit-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(124,110,240,0.3); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading { display: none; text-align: center; padding: 40px; }
    .loading.active { display: block; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #2a2a2a; border-top: 3px solid #7c6ef0;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: #888; font-size: 14px; }

    .result-area { display: none; margin-top: 24px; }
    .result-area.active { display: block; }

    .result-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
    }
    .result-header h3 { color: #fff; font-size: 18px; }
    .result-actions { display: flex; gap: 8px; }

    .action-btn {
      padding: 8px 16px; border-radius: 8px; border: 1px solid #2a2a2a;
      background: #141414; color: #aaa; cursor: pointer; font-size: 13px;
      transition: all 0.2s; font-family: inherit;
    }
    .action-btn:hover { border-color: #7c6ef0; color: #7c6ef0; }

    .result-content {
      background: #0a0a0a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px;
      white-space: pre-wrap; font-family: 'D2Coding','Consolas',monospace;
      font-size: 13px; line-height: 1.8; max-height: 600px; overflow-y: auto; color: #ccc;
    }

    .conti-meta {
      background: #111; border: 1px solid #1e1e1e; border-radius: 10px; padding: 18px;
      margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .meta-item { font-size: 13px; }
    .meta-item .meta-label { color: #888; font-size: 11px; display: block; margin-bottom: 2px; }
    .meta-item .meta-value { color: #e0e0e0; }

    /* 씬 블록: 좌우 레이아웃 */
    .scene-block {
      background: #111; border: 1px solid #1e1e1e; border-radius: 10px;
      padding: 18px; margin-bottom: 14px;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 20px;
    }

    .scene-block.no-image {
      grid-template-columns: 1fr;
    }

    .scene-info { min-width: 0; }

    .scene-block .scene-title {
      color: #7c6ef0; font-weight: 700; font-size: 14px; margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .scene-block .scene-type {
      font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500;
    }
    .scene-type.ai_video { background: #1a2a1a; color: #6ecf6e; }
    .scene-type.text_overlay { background: #2a2a1a; color: #cfcf6e; }
    .scene-type.screen_recording { background: #1a1a2a; color: #6e8ecf; }

    .scene-field { margin-bottom: 8px; font-size: 13px; line-height: 1.6; }
    .scene-field .field-label { color: #888; font-size: 12px; display: block; margin-bottom: 2px; }

    /* 이미지 미리보기 영역 */
    .scene-preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .scene-preview img {
      width: 100%;
      max-width: 260px;
      border-radius: 10px;
      border: 1px solid #2a2a2a;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .scene-preview img:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 16px rgba(124,110,240,0.2);
    }

    .preview-actions {
      display: flex;
      gap: 6px;
    }

    .preview-btn {
      padding: 6px 12px; border-radius: 6px; border: 1px solid #2a2a2a;
      background: #0a0a0a; color: #aaa; cursor: pointer; font-size: 11px;
      transition: all 0.2s; font-family: inherit;
    }
    .preview-btn:hover { border-color: #7c6ef0; color: #7c6ef0; }

    .ai-prompt-box {
      background: #0d1a0d; border: 1px solid #1a3a1a; border-radius: 8px;
      padding: 12px; margin-top: 8px; position: relative;
    }
    .ai-prompt-box code {
      color: #8fdf8f; font-family: 'D2Coding','Consolas',monospace;
      font-size: 12px; line-height: 1.6; white-space: pre-wrap;
    }

    .copy-btn {
      position: absolute; top: 8px; right: 8px; padding: 4px 10px; border-radius: 6px;
      border: 1px solid #1a3a1a; background: #0a0a0a; color: #6ecf6e;
      cursor: pointer; font-size: 11px; transition: all 0.2s; font-family: inherit;
    }
    .copy-btn:hover { background: #1a3a1a; }

    .emphasis-tag {
      display: inline-block; background: #2a2a0a; color: #e0d040;
      padding: 1px 8px; border-radius: 4px; font-size: 12px; margin: 2px;
    }

    .editing-summary {
      background: #111; border: 1px solid #1e1e1e; border-radius: 10px;
      padding: 18px; margin-top: 14px;
    }
    .editing-summary h4 { color: #cfcf6e; font-size: 14px; margin-bottom: 8px; }
    .editing-summary p { font-size: 13px; line-height: 1.7; color: #bbb; }

    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #7c6ef0; color: #fff; padding: 12px 24px; border-radius: 10px;
      font-size: 14px; transition: transform 0.3s; z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .checkbox-group { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
    .checkbox-group input[type="checkbox"] { accent-color: #7c6ef0; width: 16px; height: 16px; }
    .checkbox-group label { margin: 0; color: #aaa; font-size: 13px; }

    /* 이미지 모달 (클릭 시 크게 보기) */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 200; justify-content: center; align-items: center;
      cursor: pointer;
    }
    .modal-overlay.active { display: flex; }
    .modal-overlay img {
      max-width: 90vw; max-height: 90vh; border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    @media (max-width: 768px) {
      .scene-block { grid-template-columns: 1fr; }
      .scene-preview img { max-width: 200px; }
      .container { padding: 20px 12px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>릴스 콘티 생성기</h1>
      <p>재현의 브랜딩 채널 - 썰 or 참고 영상으로 콘티 자동 생성</p>
    </header>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('story')">썰로 콘티 생성</button>
      <button class="tab" onclick="switchTab('url')">참고 영상 분석</button>
    </div>

    <!-- 썰 모드 -->
    <div id="panel-story" class="panel active">
      <div class="card">
        <div class="form-group">
          <label>콘텐츠 유형</label>
          <div class="type-selector" id="type-story">
            <button class="type-btn active" data-type="알바 썰">알바 썰</button>
            <button class="type-btn" data-type="과거 썰">과거 썰</button>
            <button class="type-btn" data-type="개발 자랑">개발 자랑</button>
            <button class="type-btn" data-type="학습 공유">학습 공유</button>
          </div>
        </div>
        <div class="form-group">
          <label>썰 내용</label>
          <textarea id="story-text" placeholder="예: 롯데리아 첫날 감자튀김 통째로 쏟았는데 점장님이 뒤에서 보고 있었음. 근데 웃으면서 나도 그랬다고 함. 그날부터 점장님이랑 친해짐."></textarea>
        </div>
        <button class="submit-btn" onclick="submitStory()">콘티 생성하기</button>
      </div>
    </div>

    <!-- URL 모드 -->
    <div id="panel-url" class="panel">
      <div class="card">
        <div class="form-group">
          <label>참고 릴스 URL</label>
          <input type="text" id="url-input" placeholder="https://www.instagram.com/reel/...">
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="analyze-only">
          <label for="analyze-only">분석만 하기 (콘티 생성 없이)</label>
        </div>
        <div id="url-story-section">
          <div class="form-group" style="margin-top: 20px;">
            <label>콘텐츠 유형</label>
            <div class="type-selector" id="type-url">
              <button class="type-btn active" data-type="알바 썰">알바 썰</button>
              <button class="type-btn" data-type="과거 썰">과거 썰</button>
              <button class="type-btn" data-type="개발 자랑">개발 자랑</button>
              <button class="type-btn" data-type="학습 공유">학습 공유</button>
            </div>
          </div>
          <div class="form-group">
            <label>내 썰 (참고 영상 구조에 맞춰 콘티 생성)</label>
            <textarea id="url-story" placeholder="참고 영상의 구조를 모방해서 만들 내 썰을 입력하세요"></textarea>
          </div>
        </div>
        <button class="submit-btn" onclick="submitUrl()">분석 + 콘티 생성</button>
      </div>
    </div>

    <!-- 로딩 -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p id="loading-text">콘티 생성 중... (30초~1분 소요)</p>
    </div>

    <!-- 결과 -->
    <div class="result-area" id="result-area">
      <div class="result-header">
        <h3>생성된 콘티</h3>
        <div class="result-actions">
          <button class="action-btn" onclick="copyAll()">전체 복사</button>
          <button class="action-btn" onclick="downloadResult()">파일 저장</button>
          <button class="action-btn" onclick="downloadAllImages()">전체 이미지 다운로드</button>
        </div>
      </div>
      <div id="result-content"></div>
    </div>
  </div>

  <!-- 이미지 모달 -->
  <div class="modal-overlay" id="image-modal" onclick="closeModal()">
    <img id="modal-img" src="" alt="씬 미리보기">
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let currentResult = '';
    let currentRaw = null;
    let sceneImages = {}; // scene_number -> base64 매핑

    function switchTab(mode) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelector(`.tab[onclick*="${mode}"]`).classList.add('active');
      document.getElementById(`panel-${mode}`).classList.add('active');
    }

    document.querySelectorAll('.type-selector').forEach(selector => {
      selector.querySelectorAll('.type-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          selector.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
      });
    });

    document.getElementById('analyze-only').addEventListener('change', (e) => {
      document.getElementById('url-story-section').style.display =
        e.target.checked ? 'none' : 'block';
    });

    function getSelectedType(selectorId) {
      const active = document.querySelector(`#${selectorId} .type-btn.active`);
      return active ? active.dataset.type : '알바 썰';
    }

    function showLoading(text) {
      document.getElementById('loading').classList.add('active');
      document.getElementById('loading-text').textContent = text;
      document.getElementById('result-area').classList.remove('active');
    }

    function hideLoading() {
      document.getElementById('loading').classList.remove('active');
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function typeLabel(type) {
      return { 'ai_video': 'AI 영상', 'text_overlay': '텍스트', 'screen_recording': '화면녹화' }[type] || type;
    }

    // 이미지 모달
    function openModal(src) {
      document.getElementById('modal-img').src = src;
      document.getElementById('image-modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('image-modal').classList.remove('active');
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // 개별 이미지 다운로드 (sceneImages에서 가져옴)
    function downloadImage(sceneNum) {
      const b64 = sceneImages[sceneNum];
      if (!b64) return;
      const a = document.createElement('a');
      a.href = 'data:image/png;base64,' + b64;
      a.download = `scene_${sceneNum}.png`;
      a.click();
      showToast(`씬 ${sceneNum} 이미지 저장됨!`);
    }

    // 전체 이미지 다운로드
    function downloadAllImages() {
      const nums = Object.keys(sceneImages);
      if (nums.length === 0) { showToast('다운로드할 이미지가 없습니다'); return; }
      nums.forEach((num, i) => {
        setTimeout(() => downloadImage(num), i * 300);
      });
    }

    // 이미지 크게 보기
    function openModalScene(sceneNum) {
      const b64 = sceneImages[sceneNum];
      if (!b64) return;
      openModal('data:image/png;base64,' + b64);
    }

    // 콘티 렌더링
    function renderConti(raw) {
      sceneImages = {}; // 초기화
      let html = '';

      // 메타 정보
      html += `<div class="conti-meta">
        <div class="meta-item">
          <span class="meta-label">제목</span>
          <span class="meta-value">${raw.title}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">총 길이</span>
          <span class="meta-value">${raw.total_duration_sec}초</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">BGM 검색어</span>
          <span class="meta-value">${raw.bgm_keywords.join(', ')}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">추천 폰트</span>
          <span class="meta-value">${raw.font_recommendation}</span>
        </div>
      </div>`;

      // 씬 목록
      for (const scene of raw.scenes) {
        const hasImage = !!scene.image_base64;
        const sn = scene.scene_number;

        // base64를 JS 변수에 저장 (HTML에 인라인으로 넣지 않음)
        if (hasImage) {
          sceneImages[sn] = scene.image_base64;
        }

        html += `<div class="scene-block ${hasImage ? '' : 'no-image'}">
          <div class="scene-info">
            <div class="scene-title">
              씬 ${sn} (${scene.start_sec}s ~ ${scene.end_sec}s)
              <span class="scene-type ${scene.scene_type}">${typeLabel(scene.scene_type)}</span>
            </div>

            <div class="scene-field">
              <span class="field-label">화면</span>
              ${scene.visual_description}
            </div>

            <div class="scene-field">
              <span class="field-label">TTS</span>
              "${scene.tts_script || '(없음)'}"
            </div>

            <div class="scene-field">
              <span class="field-label">자막</span>
              "${scene.subtitle_text}"
              <div style="margin-top:4px">
                ${scene.emphasis_keywords.map(k => `<span class="emphasis-tag">${k}</span>`).join('')}
              </div>
            </div>`;

        if (scene.ai_video_prompt) {
          const promptId = `prompt-${sn}`;
          html += `
            <div class="scene-field">
              <span class="field-label">AI 영상 프롬프트 (복붙용)</span>
              <div class="ai-prompt-box">
                <button class="copy-btn" onclick="copyPrompt('${promptId}')">복사</button>
                <code id="${promptId}">${scene.ai_video_prompt}</code>
              </div>
            </div>`;
        }

        html += `
            <div class="scene-field">
              <span class="field-label">CapCut 편집 노트</span>
              ${scene.capcut_notes}
            </div>
          </div>`;

        // 이미지 미리보기 (오른쪽) - id로 참조, base64는 JS 변수에서
        if (hasImage) {
          html += `
          <div class="scene-preview">
            <img id="scene-img-${sn}" alt="씬 ${sn} 미리보기"
                 onclick="openModalScene(${sn})" title="클릭하면 크게 보기">
            <div class="preview-actions">
              <button class="preview-btn" onclick="downloadImage(${sn})">다운로드</button>
              <button class="preview-btn" onclick="openModalScene(${sn})">크게 보기</button>
            </div>
          </div>`;
        }

        html += `</div>`;
      }

      // 편집 가이드
      html += `<div class="editing-summary">
        <h4>CapCut 전체 편집 가이드</h4>
        <p>${raw.editing_summary}</p>
      </div>`;

      return html;
    }

    function showResult(data) {
      hideLoading();
      currentResult = data.result;
      currentRaw = data.raw;

      const container = document.getElementById('result-content');

      if (data.raw) {
        container.innerHTML = renderConti(data.raw);

        console.log('[DEBUG] sceneImages keys:', Object.keys(sceneImages));

        // 이미지 src를 JS에서 설정 (inline base64가 HTML을 깨뜨리지 않도록)
        for (const [sn, b64] of Object.entries(sceneImages)) {
          const img = document.getElementById(`scene-img-${sn}`);
          console.log(`[DEBUG] scene-img-${sn}: element=${!!img}, b64 len=${b64?.length}`);
          if (img && b64) {
            img.src = 'data:image/png;base64,' + b64;
          }
        }
      } else {
        container.innerHTML = `<div class="result-content">${data.result}</div>`;
      }

      document.getElementById('result-area').classList.add('active');
      document.getElementById('result-area').scrollIntoView({ behavior: 'smooth' });
    }

    function copyPrompt(id) {
      const text = document.getElementById(id).textContent;
      navigator.clipboard.writeText(text);
      showToast('프롬프트 복사됨!');
    }

    function copyAll() {
      navigator.clipboard.writeText(currentResult);
      showToast('전체 콘티 복사됨!');
    }

    function downloadResult() {
      const blob = new Blob([currentResult], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `conti_${Date.now()}.txt`;
      a.click();
      showToast('파일 저장됨!');
    }

    async function submitStory() {
      const story = document.getElementById('story-text').value.trim();
      if (!story) { showToast('썰을 입력해주세요!'); return; }

      showLoading('콘티 생성 중... (30초~1분 소요)');

      try {
        const res = await fetch('/api/story', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ story, content_type: getSelectedType('type-story') }),
        });

        if (!res.ok) { const err = await res.json(); throw new Error(err.detail || '서버 오류'); }
        const data = await res.json();
        console.log('[DEBUG] API response:', { success: data.success, hasRaw: !!data.raw, sceneCount: data.raw?.scenes?.length });
        if (data.raw?.scenes) {
          data.raw.scenes.forEach(s => {
            console.log(`[DEBUG] 씬${s.scene_number} type=${s.scene_type} hasImg=${!!s.image_base64}`);
          });
        }
        showResult(data);
      } catch (e) {
        hideLoading();
        console.error('[DEBUG] submitStory error:', e);
        showToast('오류: ' + e.message);
      }
    }

    async function submitUrl() {
      const url = document.getElementById('url-input').value.trim();
      if (!url) { showToast('URL을 입력해주세요!'); return; }

      const analyzeOnly = document.getElementById('analyze-only').checked;
      const story = analyzeOnly ? null : document.getElementById('url-story').value.trim();

      if (!analyzeOnly && !story) {
        showToast('썰을 입력하거나 "분석만 하기"를 체크해주세요!');
        return;
      }

      showLoading(analyzeOnly ? '영상 분석 중... (1~2분 소요)' : '영상 분석 + 콘티 생성 중... (1~2분 소요)');

      try {
        const res = await fetch('/api/url', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, story, content_type: getSelectedType('type-url'), analyze_only: analyzeOnly }),
        });

        if (!res.ok) { const err = await res.json(); throw new Error(err.detail || '서버 오류'); }
        showResult(await res.json());
      } catch (e) {
        hideLoading();
        showToast('오류: ' + e.message);
      }
    }
  </script>
</body>
</html>
